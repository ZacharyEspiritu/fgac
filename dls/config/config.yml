# Local backend defaults and deterministic trial seeds used by reviewer runs.
#
# Direct enumerator runs can still override connection settings with
# backend-specific environment variables.
backends:
  opensearch:
    label: OpenSearch
    compose_file: config/docker-compose.opensearch.yml
    service: opensearch
    env:
      OPENSEARCH_HOST: localhost
      OPENSEARCH_PORT: 9200
      OPENSEARCH_SCHEME: https
      OPENSEARCH_VERIFY_CERTS: false
      OPENSEARCH_ADMIN_USERNAME: admin
      OPENSEARCH_ADMIN_PASSWORD: "@!A134Kwjdoiwna!"
      OPENSEARCH_USER_PASSWORD: KTrdMBtPB6NmUXP
  elasticsearch:
    label: Elasticsearch
    compose_file: config/docker-compose.elastic.yml
    service: elasticsearch
    env:
      ELASTICSEARCH_HOST: localhost
      ELASTICSEARCH_PORT: 9201
      ELASTICSEARCH_SCHEME: http
      ELASTICSEARCH_VERIFY_CERTS: false
      ELASTICSEARCH_ADMIN_USERNAME: elastic
      ELASTICSEARCH_ADMIN_PASSWORD: "@!A134Kwjdoiwna!"
      ELASTICSEARCH_USER_USERNAME: user
      ELASTICSEARCH_USER_PASSWORD: KTrdMBtPB6NmUXP

# Fixed attack parameters used by run.sh for reviewer experiments.
attack:
  text_field_type: search_as_you_type
  search_as_you_type_max_shingle_size: 4
  analyze_max_token_count: 1000000
  prefix_query_mode: span_prefix
  chars: "abcdefghijklmnopqrstuvwxyz0123456789'.,:_"
  exact_strategy: optimized
  batch_size: 2048
  recover_ngrams: true
  ngram_size: 4

# Fixed reconstruction parameters used by run.sh after each attack run.
reconstruction:
  k: 4
  source: recovered
  traversal: euler

# Keys are "<D>:<trial>" and values are the random seeds passed to enumerator.
#
# These random seeds were the random seeds used in the paper experiments. The
# random seeds affect the control terms that are generated during the course of
# the attack. Feel free to change them if you want to try different random
# seeds; you should get essentially the same results due to the determinism of
# the attack side-channel.
seeds:
  "1:1": 12532882246817266601
  "1:2": 12532882246817266602
  "1:3": 12532882246817266603
  "10:1": 12532882246817266554
  "10:2": 12532882246817266555
  "10:3": 12532882246817266556
  "100:1": 12532882246817266701
  "100:2": 12532882246817266702
  "100:3": 12532882246817266703
  "1000:1": 12532882246817266801
  "1000:2": 12532882246817266802
  "1000:3": 12532882246817266803
